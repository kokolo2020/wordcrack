<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="description" content="WordCrack Hangman — Classic hangman with Easy, Hard and Pro difficulty levels and leaderboard."/>
<title>WordCrack — Hangman</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9700227474442026" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f5f3ff;--surface:#fff;--accent:#5b4fcf;--accent2:#f0544f;--accent3:#f59e0b;
  --text:#1e1b4b;--muted:#7c75b0;--border:#e4e0f7;--green:#16a34a;--red:#ef4444;
  --chip:#eeeaff;--font:'Outfit',sans-serif;--mono:'Space Mono',monospace;
  --radius:14px;--shadow:0 2px 16px rgba(91,79,207,.10);
}
html{font-size:16px}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}
.app{max-width:480px;margin:0 auto;padding:20px 16px 16px}

/* NAV */
.nav-bar{display:flex;gap:7px;margin-bottom:20px}
.nav-link{flex:1;padding:9px 4px;text-align:center;border-radius:10px;font-size:12px;font-weight:700;text-decoration:none;border:1.5px solid var(--border);color:var(--muted);background:var(--surface);letter-spacing:.02em}
.nav-link.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* HEADER */
.page-logo{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px}
.page-title{font-size:clamp(30px,8vw,42px);font-weight:900;color:var(--text);line-height:1;letter-spacing:-1.5px;margin-bottom:4px}
.page-title span{color:var(--accent)}
.page-sub{font-size:13px;color:var(--muted);margin-bottom:18px}

/* TABS */
.tab-bar{display:flex;gap:6px;margin-bottom:20px;background:var(--chip);border-radius:12px;padding:4px}
.tab-btn{flex:1;padding:9px;border:none;background:transparent;border-radius:9px;font-family:var(--font);font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .18s}
.tab-btn.active{background:var(--surface);color:var(--accent);box-shadow:var(--shadow)}

/* CARD */
.card{background:var(--surface);border-radius:var(--radius);border:1.5px solid var(--border);padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}

/* DIFFICULTY */
.diff-row{display:flex;gap:7px;margin-bottom:16px}
.diff-btn{flex:1;padding:9px 4px;border:1.5px solid var(--border);border-radius:10px;background:var(--surface);font-family:var(--font);font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;text-align:center;transition:all .15s}
.diff-btn.active{border-color:var(--accent);background:var(--chip);color:var(--accent)}

/* GALLOWS */
.gallows-wrap{display:flex;justify-content:center;margin-bottom:12px}
.gallows-wrap svg{width:160px;height:160px}

/* WORD DISPLAY */
.word-row{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-bottom:14px;min-height:52px;align-items:flex-end}
.letter-box{display:flex;flex-direction:column;align-items:center;gap:3px}
.letter-char{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--text);min-width:24px;text-align:center;height:28px;line-height:28px}
.letter-line{width:24px;height:2.5px;background:var(--accent);border-radius:2px}

/* HINT */
.hint-chip{display:inline-flex;align-items:center;gap:5px;background:var(--chip);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;color:var(--accent);margin-bottom:10px}

/* KEYBOARD */
.kbd{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.kbd-row{display:flex;justify-content:center;gap:4px}
.kbd-key{width:32px;height:38px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface);font-family:var(--font);font-size:13px;font-weight:700;color:var(--text);cursor:pointer;transition:all .1s;flex-shrink:0}
.kbd-key:active{transform:scale(.93)}
.kbd-key.used-correct{background:var(--green);border-color:var(--green);color:#fff}
.kbd-key.used-wrong{background:#e5e7eb;border-color:#d1d5db;color:#9ca3af}
.kbd-key:disabled{cursor:default;pointer-events:none}

/* STATUS */
.status-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.lives-row{display:flex;gap:4px}
.heart{font-size:17px;line-height:1}
.heart.lost{filter:grayscale(1);opacity:.35}
.wrong-letters{font-family:var(--mono);font-size:12px;color:var(--red);font-weight:700;letter-spacing:.05em}

/* RESULT BANNER */
.result-banner{border-radius:12px;padding:16px;text-align:center;margin-bottom:14px;animation:pop .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.result-banner.win{background:#dcfce7;border:1.5px solid #86efac}
.result-banner.lose{background:#fee2e2;border:1.5px solid #fca5a5}
.result-title{font-size:20px;font-weight:800;margin-bottom:4px}
.result-word{font-family:var(--mono);font-size:13px;color:var(--muted);margin-bottom:10px}
.play-again-btn{padding:10px 24px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer}

/* SCORE SUBMIT */
.score-form{margin-top:10px;display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap}
.score-input{padding:8px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:var(--font);font-size:13px;font-weight:600;color:var(--text);outline:none;width:140px;text-align:center}
.score-input:focus{border-color:var(--accent)}
.score-submit-btn{padding:8px 16px;background:var(--accent3);color:#fff;border:none;border-radius:9px;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer}
.score-submitted{font-size:12px;color:var(--green);font-weight:700;margin-top:6px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat-box{background:var(--chip);border-radius:10px;padding:10px;text-align:center}
.stat-num{font-size:22px;font-weight:800;color:var(--accent);line-height:1;margin-bottom:2px}
.stat-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}

/* LEADERBOARD */
.lb-diff-row{display:flex;gap:6px;margin-bottom:12px}
.lb-diff-btn{flex:1;padding:7px;border:1.5px solid var(--border);border-radius:9px;background:var(--surface);font-family:var(--font);font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;text-align:center;transition:all .15s}
.lb-diff-btn.active{border-color:var(--accent);background:var(--chip);color:var(--accent)}
.lb-table{width:100%;border-collapse:collapse}
.lb-table th{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:6px 8px;text-align:left;border-bottom:1.5px solid var(--border)}
.lb-table td{padding:8px;font-size:13px;border-bottom:1px solid var(--border)}
.lb-rank{font-family:var(--mono);font-weight:700;color:var(--muted);font-size:12px}
.lb-rank.gold{color:#f59e0b}
.lb-rank.silver{color:#9ca3af}
.lb-rank.bronze{color:#b45309}
.lb-name{font-weight:700;color:var(--text)}
.lb-score{font-family:var(--mono);font-weight:700;color:var(--accent);text-align:right}
.lb-date{font-size:11px;color:var(--muted)}
.lb-empty{text-align:center;padding:20px;color:var(--muted);font-size:13px}
.lb-loading{text-align:center;padding:16px;color:var(--muted);font-size:12px}

/* AD */
.ad-wrap{margin:10px 0;min-height:60px;display:flex;align-items:center;justify-content:center}

@media(max-width:360px){.kbd-key{width:28px;height:34px;font-size:11px}}
</style>
</head>
<body>
<div class="app">
  <p class="page-logo">WordCrack</p>
  <h1 class="page-title">Hang<span>man</span></h1>
  <p class="page-sub">Guess the word before the man drops!</p>

  <nav class="nav-bar">
    <a href="/" class="nav-link">🔤 WordCrack</a>
    <a href="hangman.html" class="nav-link active">🪢 Hangman</a>
  </nav>

  <div class="ad-wrap">
    <ins class="adsbygoogle" style="display:inline-block;width:320px;height:50px" data-ad-client="ca-pub-9700227474442026" data-ad-slot="AUTO"></ins>
  </div>

  <!-- TABS -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('game')">🎮 Play</button>
    <button class="tab-btn" onclick="switchTab('lb')">🏆 Leaderboard</button>
  </div>

  <!-- ===== GAME TAB ===== -->
  <div id="game-tab">
    <div class="diff-row">
      <button class="diff-btn active" onclick="setDiff('easy',this)">😊 Easy<br><small>3–5 letters</small></button>
      <button class="diff-btn" onclick="setDiff('hard',this)">😤 Hard<br><small>6–7 letters</small></button>
      <button class="diff-btn" onclick="setDiff('pro',this)">💀 Pro<br><small>8–14 letters</small></button>
    </div>

    <div class="card" id="game-card">
      <div class="gallows-wrap">
        <svg viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
          <line x1="20" y1="150" x2="140" y2="150" stroke="#7c75b0" stroke-width="3" stroke-linecap="round"/>
          <line x1="60" y1="150" x2="60" y2="10" stroke="#7c75b0" stroke-width="3" stroke-linecap="round"/>
          <line x1="60" y1="10" x2="110" y2="10" stroke="#7c75b0" stroke-width="3" stroke-linecap="round"/>
          <line x1="110" y1="10" x2="110" y2="28" stroke="#7c75b0" stroke-width="3" stroke-linecap="round"/>
          <circle id="g-head" cx="110" cy="38" r="10" stroke="#f0544f" stroke-width="2.5" style="display:none"/>
          <line id="g-body" x1="110" y1="48" x2="110" y2="90" stroke="#f0544f" stroke-width="2.5" stroke-linecap="round" style="display:none"/>
          <line id="g-larm" x1="110" y1="60" x2="90" y2="78" stroke="#f0544f" stroke-width="2.5" stroke-linecap="round" style="display:none"/>
          <line id="g-rarm" x1="110" y1="60" x2="130" y2="78" stroke="#f0544f" stroke-width="2.5" stroke-linecap="round" style="display:none"/>
          <line id="g-lleg" x1="110" y1="90" x2="92" y2="114" stroke="#f0544f" stroke-width="2.5" stroke-linecap="round" style="display:none"/>
          <line id="g-rleg" x1="110" y1="90" x2="128" y2="114" stroke="#f0544f" stroke-width="2.5" stroke-linecap="round" style="display:none"/>
        </svg>
      </div>

      <div class="status-row">
        <div class="lives-row" id="hearts-row"></div>
        <div class="wrong-letters" id="wrong-display"></div>
      </div>

      <div style="text-align:center;margin-bottom:8px">
        <span class="hint-chip" id="hint-chip">🎯 Category</span>
      </div>

      <div class="word-row" id="word-display"></div>
      <div id="result-banner" style="display:none"></div>
      <div class="kbd" id="keyboard"></div>

      <div style="text-align:center">
        <button id="new-game-btn" class="play-again-btn" onclick="startGame()" style="display:none">🔁 New Word</button>
      </div>
    </div>

    <div class="ad-wrap">
      <ins class="adsbygoogle" style="display:inline-block;width:320px;height:100px" data-ad-client="ca-pub-9700227474442026" data-ad-slot="AUTO"></ins>
    </div>

    <div class="card">
      <p style="font-size:13px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">Your Stats</p>
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-num" id="s-played">0</div><div class="stat-label">Played</div></div>
        <div class="stat-box"><div class="stat-num" id="s-wins">0</div><div class="stat-label">Wins</div></div>
        <div class="stat-box"><div class="stat-num" id="s-streak">0</div><div class="stat-label">Best Streak</div></div>
      </div>
    </div>
  </div>

  <!-- ===== LEADERBOARD TAB ===== -->
  <div id="lb-tab" style="display:none">
    <div class="lb-diff-row">
      <button class="lb-diff-btn active" onclick="setLbDiff('easy',this)">😊 Easy</button>
      <button class="lb-diff-btn" onclick="setLbDiff('hard',this)">😤 Hard</button>
      <button class="lb-diff-btn" onclick="setLbDiff('pro',this)">💀 Pro</button>
    </div>
    <div class="card">
      <div id="lb-content"><div class="lb-loading">⏳ Loading…</div></div>
    </div>
  </div>

  <div class="ad-wrap">
    <ins class="adsbygoogle" style="display:inline-block;width:320px;height:50px" data-ad-client="ca-pub-9700227474442026" data-ad-slot="AUTO"></ins>
  </div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const SUPABASE_URL = 'https://mjnigheggxtythytsqle.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qbmlnaGVnZ3h0eXRoeXRzcWxlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNzYwMDcsImV4cCI6MjA5NTY1MjAwN30.mh1psePuKeQ8SH5uita7BsUKd6wd5IwHVVlDmJCMA0Q';

// ============================================================
// WORD BANKS
// ============================================================
const WORDS = {
  easy: [
    {w:'CAT',h:'🐱 Animal'},{w:'DOG',h:'🐶 Animal'},{w:'SUN',h:'🌤️ Nature'},{w:'MAP',h:'🗺️ Object'},
    {w:'BEE',h:'🐝 Insect'},{w:'ICE',h:'❄️ Nature'},{w:'EGG',h:'🥚 Food'},{w:'JAM',h:'🍓 Food'},
    {w:'PIG',h:'🐷 Animal'},{w:'ANT',h:'🐜 Insect'},{w:'OWL',h:'🦉 Animal'},{w:'FOX',h:'🦊 Animal'},
    {w:'CAKE',h:'🎂 Food'},{w:'FISH',h:'🐟 Animal'},{w:'FROG',h:'🐸 Animal'},{w:'LION',h:'🦁 Animal'},
    {w:'BEAR',h:'🐻 Animal'},{w:'BIRD',h:'🐦 Animal'},{w:'DRUM',h:'🥁 Music'},{w:'BOOK',h:'📚 Object'},
    {w:'RING',h:'💍 Object'},{w:'STAR',h:'⭐ Nature'},{w:'MOON',h:'🌙 Nature'},{w:'RAIN',h:'🌧️ Nature'},
  ],
  hard: [
    {w:'PLANET',h:'🪐 Space'},{w:'BRIDGE',h:'🌉 Structure'},{w:'CASTLE',h:'🏰 Building'},
    {w:'GUITAR',h:'🎸 Music'},{w:'JUNGLE',h:'🌿 Nature'},{w:'LIZARD',h:'🦎 Animal'},
    {w:'MIRROR',h:'🪞 Object'},{w:'NECTAR',h:'🍯 Nature'},{w:'OYSTER',h:'🦪 Seafood'},
    {w:'PURPLE',h:'🎨 Color'},{w:'RABBIT',h:'🐰 Animal'},{w:'SILVER',h:'🥈 Metal'},
    {w:'TEMPLE',h:'⛩️ Building'},{w:'VELVET',h:'🧶 Fabric'},{w:'WALRUS',h:'🦭 Animal'},
    {w:'YELLOW',h:'🌼 Color'},{w:'ZIPPER',h:'👕 Object'},{w:'ANCHOR',h:'⚓ Nautical'},
    {w:'BUBBLE',h:'💬 Thing'},{w:'CANVAS',h:'🎨 Art'},{w:'DANGER',h:'⚠️ Concept'},
    {w:'FALCON',h:'🦅 Bird'},{w:'ELEVEN',h:'🔢 Number'},{w:'UNFAIR',h:'⚖️ Concept'},
  ],
  pro: [
    {w:'ADVENTURE',h:'🗺️ Concept'},{w:'BEAUTIFUL',h:'✨ Concept'},{w:'CHOCOLATE',h:'🍫 Food'},
    {w:'DEMOCRACY',h:'🗳️ Politics'},{w:'ELABORATE',h:'📝 Concept'},{w:'FRAMEWORK',h:'💻 Tech'},
    {w:'GEOGRAPHY',h:'🌍 Subject'},{w:'HAPPINESS',h:'😊 Emotion'},{w:'INFLUENCE',h:'💡 Concept'},
    {w:'JELLYFISH',h:'🪼 Animal'},{w:'KNOWLEDGE',h:'📚 Concept'},{w:'LABYRINTH',h:'🌀 Structure'},
    {w:'MUSHROOMS',h:'🍄 Food'},{w:'NIGHTMARE',h:'😱 Dream'},{w:'ORCHESTRA',h:'🎼 Music'},
    {w:'PORCUPINE',h:'🦔 Animal'},{w:'QUICKSAND',h:'🏜️ Nature'},{w:'RASPBERRY',h:'🍇 Fruit'},
    {w:'SANCTUARY',h:'🕊️ Place'},{w:'TELESCOPE',h:'🔭 Tool'},{w:'UNANIMOUS',h:'🤝 Concept'},
    {w:'CHRYSANTHEMUM',h:'🌸 Flower'},{w:'EXTRAORDINARY',h:'✨ Concept'},{w:'CATASTROPHE',h:'💥 Event'},
  ]
};

const BODY_PARTS = ['g-head','g-body','g-larm','g-rarm','g-lleg','g-rleg'];
const MAX_WRONG = 6;

// ============================================================
// GAME STATE
// ============================================================
let state = { word:'', hint:'', guessed:new Set(), wrongCount:0, diff:'easy', gameOver:false };
let stats = JSON.parse(localStorage.getItem('hangman_stats')||'{"played":0,"wins":0,"streak":0,"bestStreak":0}');
let currentStreak = 0;
let scoreSubmitted = false;

function setDiff(d, el) {
  state.diff = d;
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  startGame();
}

function startGame() {
  const pool = WORDS[state.diff];
  const pick = pool[Math.floor(Math.random()*pool.length)];
  state.word = pick.w;
  state.hint = pick.h;
  state.guessed = new Set();
  state.wrongCount = 0;
  state.gameOver = false;
  scoreSubmitted = false;
  document.getElementById('result-banner').style.display = 'none';
  document.getElementById('new-game-btn').style.display = 'none';
  render();
  updateStatsUI();
}

function render() {
  // Gallows
  BODY_PARTS.forEach((id,i)=>{ document.getElementById(id).style.display = i < state.wrongCount ? '' : 'none'; });
  // Hearts
  document.getElementById('hearts-row').innerHTML =
    Array.from({length:MAX_WRONG},(_,i)=>`<span class="heart${i>=MAX_WRONG-state.wrongCount?' lost':''}">❤️</span>`).join('');
  // Wrong letters
  const wrong = [...state.guessed].filter(l=>!state.word.includes(l));
  document.getElementById('wrong-display').textContent = wrong.length ? wrong.join(' ') : '';
  // Hint
  document.getElementById('hint-chip').textContent = state.hint;
  // Word
  document.getElementById('word-display').innerHTML = state.word.split('').map(l=>{
    const show = state.guessed.has(l) || state.gameOver;
    return `<div class="letter-box"><div class="letter-char">${show?l:'&nbsp;'}</div><div class="letter-line"></div></div>`;
  }).join('');
  // Keyboard
  buildKbd();
}

function guess(letter) {
  if(state.gameOver || state.guessed.has(letter)) return;
  state.guessed.add(letter);
  if(!state.word.includes(letter)) state.wrongCount++;
  const won = state.word.split('').every(l=>state.guessed.has(l));
  const lost = state.wrongCount >= MAX_WRONG;
  if(won || lost) {
    state.gameOver = true;
    stats.played++;
    if(won) {
      currentStreak++;
      stats.wins++;
      if(currentStreak > stats.bestStreak) stats.bestStreak = currentStreak;
    } else {
      currentStreak = 0;
    }
    stats.streak = currentStreak;
    localStorage.setItem('hangman_stats', JSON.stringify(stats));
    showResult(won);
    document.getElementById('new-game-btn').style.display = '';
    updateStatsUI();
  }
  render();
}

function showResult(won) {
  const el = document.getElementById('result-banner');
  el.className = `result-banner ${won?'win':'lose'}`;
  el.style.display = '';
  const streakMsg = won && currentStreak > 1 ? `🔥 ${currentStreak} streak!` : '';
  el.innerHTML = `
    <div class="result-title">${won?'🎉 You Won!':'💀 Game Over'}</div>
    <div class="result-word">Word: <b>${state.word}</b> ${streakMsg}</div>
    ${won ? `
      <div class="score-form" id="score-form">
        <input type="text" class="score-input" id="score-name" maxlength="16" placeholder="Your name" autocomplete="off"/>
        <button class="score-submit-btn" onclick="submitScore()">📊 Submit</button>
      </div>
    ` : ''}
  `;
}

async function submitScore() {
  if(scoreSubmitted) return;
  const name = document.getElementById('score-name').value.trim() || 'Anonymous';
  const score = currentStreak;
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/hangman_scores`, {
      method:'POST',
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body: JSON.stringify({name, difficulty:state.diff, streak:score, word:state.word})
    });
    scoreSubmitted = true;
    document.getElementById('score-form').innerHTML = `<div class="score-submitted">✅ Score submitted!</div>`;
  } catch(e) {
    document.getElementById('score-form').innerHTML = `<div class="score-submitted" style="color:var(--red)">❌ Failed to submit</div>`;
  }
}

function buildKbd() {
  const rows = [['Q','W','E','R','T','Y','U','I','O','P'],['A','S','D','F','G','H','J','K','L'],['Z','X','C','V','B','N','M']];
  document.getElementById('keyboard').innerHTML = rows.map(row=>`<div class="kbd-row">${row.map(l=>{
    const used = state.guessed.has(l);
    const correct = used && state.word.includes(l);
    const cls = used ? (correct?'used-correct':'used-wrong') : '';
    return `<button class="kbd-key ${cls}" ${used||state.gameOver?'disabled':''} onclick="guess('${l}')">${l}</button>`;
  }).join('')}</div>`).join('');
}

function updateStatsUI() {
  document.getElementById('s-played').textContent = stats.played;
  document.getElementById('s-wins').textContent = stats.wins;
  document.getElementById('s-streak').textContent = stats.bestStreak;
}

document.addEventListener('keydown', e=>{
  if(document.getElementById('game-tab').style.display==='none') return;
  if(document.activeElement.tagName==='INPUT') return;
  const l = e.key.toUpperCase();
  if(/^[A-Z]$/.test(l)) guess(l);
});

// ============================================================
// LEADERBOARD
// ============================================================
let lbDiff = 'easy';

function setLbDiff(d, el) {
  lbDiff = d;
  document.querySelectorAll('.lb-diff-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  loadLeaderboard();
}

async function loadLeaderboard() {
  document.getElementById('lb-content').innerHTML = '<div class="lb-loading">⏳ Loading…</div>';
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/hangman_scores?difficulty=eq.${lbDiff}&order=streak.desc,created_at.asc&limit=20`, {
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
    });
    const rows = await r.json();
    if(!rows.length) {
      document.getElementById('lb-content').innerHTML = '<div class="lb-empty">No scores yet — be the first! 🏆</div>';
      return;
    }
    const medals = ['🥇','🥈','🥉'];
    const rankClass = ['gold','silver','bronze'];
    document.getElementById('lb-content').innerHTML = `
      <table class="lb-table">
        <thead><tr><th>#</th><th>Name</th><th style="text-align:right">Streak</th><th>Date</th></tr></thead>
        <tbody>${rows.map((r,i)=>`
          <tr>
            <td><span class="lb-rank ${rankClass[i]||''}">${medals[i]||'#'+(i+1)}</span></td>
            <td><span class="lb-name">${escHtml(r.name)}</span></td>
            <td class="lb-score">${r.streak}</td>
            <td class="lb-date">${new Date(r.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  } catch(e) {
    document.getElementById('lb-content').innerHTML = '<div class="lb-empty">⚠️ Could not load leaderboard</div>';
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================================================
// TABS
// ============================================================
function switchTab(tab) {
  document.getElementById('game-tab').style.display = tab==='game' ? '' : 'none';
  document.getElementById('lb-tab').style.display = tab==='lb' ? '' : 'none';
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&tab==='game')||(i===1&&tab==='lb')));
  if(tab==='lb') loadLeaderboard();
}

// ============================================================
// INIT
// ============================================================
startGame();
updateStatsUI();
try{(adsbygoogle=window.adsbygoogle||[]).push({})}catch(e){}
</script>
